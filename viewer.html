<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weibo Group Chat Viewer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif; background: #fff; color: #0f1419; height: 100vh; display: flex; flex-direction: column; }

/* Top nav */
.nav { border-bottom: 1px solid #eff3f4; flex-shrink: 0; }
.nav-top { display: flex; align-items: center; padding: 0 16px; height: 53px; gap: 16px; }
.nav-title { font-size: 20px; font-weight: 700; }
.nav-date { height: 32px; padding: 0 12px; border: 1px solid #cfd9de; border-radius: 9999px; background: #fff; color: #0f1419; cursor: pointer; font-size: 14px; font-weight: 700; }
.nav-date:hover { background: #f7f9f9; }
.nav-group-select { height: 32px; padding: 0 12px; border: 1px solid #cfd9de; border-radius: 9999px; background: #fff; color: #0f1419; cursor: pointer; font-size: 14px; font-weight: 700; }
.nav-group-select:hover { background: #f7f9f9; }
.nav-stats { font-size: 13px; color: #536471; }
.nav-last-archived { margin-left: auto; font-size: 12px; color: #536471; white-space: nowrap; }

/* Calendar */
.calendar { display: none; flex-direction: column; align-items: center; padding: 12px 16px; border-bottom: 1px solid #eff3f4; }
.calendar.show { display: flex; }
.calendar-header { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; }
.calendar-header span { font-size: 15px; font-weight: 700; min-width: 100px; text-align: center; }
.cal-arrow { width: 32px; height: 32px; border-radius: 50%; border: none; background: none; cursor: pointer; font-size: 16px; color: #536471; display: flex; align-items: center; justify-content: center; }
.cal-arrow:hover { background: #f7f9f9; color: #0f1419; }
.cal-arrow:disabled { opacity: 0.3; cursor: default; }
.cal-arrow:disabled:hover { background: none; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 36px); gap: 2px; text-align: center; }
.cal-weekday { font-size: 12px; color: #536471; height: 28px; display: flex; align-items: center; justify-content: center; }
.cal-day { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #536471; cursor: default; }
.cal-day.has-data { cursor: pointer; color: #0f1419; font-weight: 500; }
.cal-day.has-data:hover { background: #e8f5fd; }
.cal-day.selected { background: #1d9bf0; color: #fff; font-weight: 700; }
.cal-day.today { border: 1px solid #1d9bf0; }
.cal-day.empty { visibility: hidden; }

/* Main layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Sidebar user list */
.sidebar { width: 290px; border-right: 1px solid #eff3f4; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 12px 16px; font-size: 20px; font-weight: 700; }
.user-list { flex: 1; overflow-y: auto; }
.user-item { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; transition: background .15s; gap: 12px; }
.user-item:hover { background: #f7f9f9; }
.user-item.active { background: #e8f5fd; }
.user-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 15px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-count { font-size: 13px; color: #536471; }
.user-clear { padding: 12px 16px; border-top: 1px solid #eff3f4; }
.user-clear button { width: 100%; padding: 8px 0; border: 1px solid #cfd9de; border-radius: 9999px; background: #fff; cursor: pointer; font-size: 14px; font-weight: 700; color: #0f1419; transition: background .15s; }
.user-clear button:hover { background: #f7f9f9; }

/* Content area */
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid #eff3f4; }

/* Hour heatmap */
.hours-bar { padding: 8px 16px 4px; border-bottom: 1px solid #eff3f4; flex-shrink: 0; }
.heatmap { display: flex; gap: 2px; align-items: flex-end; }
.heatmap-cell { flex: 1; min-width: 0; height: 24px; border-radius: 3px; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; }
.heatmap-cell:hover { transform: scale(1.08); z-index: 1; }
.heatmap-cell.active { box-shadow: 0 0 0 2px #1d9bf0; }
.heatmap-cell.empty { height: 4px; cursor: default; opacity: 0.5; padding: 0; }
.heatmap-cell.empty:hover { transform: none; }
.heatmap-labels { display: flex; gap: 2px; margin-top: 3px; }
.heatmap-label { flex: 1; min-width: 0; text-align: center; font-size: 10px; color: #536471; line-height: 1; }
.heatmap-label.show { visibility: visible; }
.heatmap-label.hide { visibility: hidden; }
.heatmap-count { font-size: 9px; color: #0f1419; font-weight: 700; line-height: 1; pointer-events: none; text-shadow: 0 0 2px rgba(255,255,255,0.8); }
.heatmap-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.heatmap-title { font-size: 12px; color: #536471; }
.hours-clear { padding: 0 4px; border: none; background: none; color: #536471; cursor: pointer; font-size: 12px; }
.hours-clear:hover { color: #1d9bf0; }

/* Media filter */
.media-bar { padding: 4px 16px 8px; display: flex; gap: 6px; }
.media-btn { padding: 3px 10px; border: 1px solid #cfd9de; border-radius: 9999px; background: #fff; cursor: pointer; font-size: 12px; color: #536471; transition: all .15s; }
.media-btn:hover { background: #f7f9f9; }
.media-btn.active { background: #1d9bf0; color: #fff; border-color: #1d9bf0; }

/* Tooltip */
[data-tooltip] { position: relative; }
[data-tooltip]::after { content: attr(data-tooltip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); padding: 4px 10px; border-radius: 6px; background: #0f1419; color: #fff; font-size: 12px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 100; }
[data-tooltip]:hover::after { opacity: 1; }
.heatmap-title[data-tooltip]::after { left: 0; transform: none; }

/* Filter status */
.filter-bar { padding: 0 16px; height: 0; overflow: hidden; transition: height .2s; font-size: 13px; color: #536471; display: flex; align-items: center; }
.filter-bar.show { height: 36px; border-bottom: 1px solid #eff3f4; }
.filter-bar span { color: #1d9bf0; }

/* Search */
.search-bar { display: flex; align-items: center; padding: 6px 16px; gap: 8px; border-bottom: 1px solid #eff3f4; flex-shrink: 0; }
.search-input-wrap { position: relative; flex: 1; max-width: 400px; }
.search-input { width: 100%; height: 36px; padding: 0 36px 0 36px; border: 1px solid #cfd9de; border-radius: 9999px; background: #f7f9f9; font-size: 14px; color: #0f1419; outline: none; transition: border-color .15s; }
.search-input:focus { border-color: #1d9bf0; background: #fff; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
.search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; border: none; border-radius: 50%; background: #1d9bf0; color: #fff; font-size: 13px; cursor: pointer; display: none; align-items: center; justify-content: center; line-height: 1; }
.search-clear.show { display: flex; }
.search-count { font-size: 13px; color: #536471; white-space: nowrap; }
.search-highlight { background: #fff3bf; border-radius: 2px; padding: 0 1px; }

/* New message badge */
.msg-new { display: inline-block; padding: 1px 6px; border-radius: 3px; background: #1d9bf0; color: #fff; font-size: 10px; font-weight: 700; margin-left: 8px; vertical-align: middle; }

/* Message list */
.messages { flex: 1; overflow-y: auto; }
.msg-item { display: grid; grid-template-columns: minmax(150px, 220px) minmax(0, 1fr); padding: 12px 16px 12px 12px; border-bottom: 1px solid #eff3f4; border-left: 4px solid var(--user-accent, #cfd9de); gap: 16px; transition: background .1s; }
.msg-item:hover { background: #f7f9f9; }
.msg-item-continuation { padding-top: 6px; padding-bottom: 6px; border-bottom-color: #f2f5f7; }
.msg-meta { min-width: 0; padding-top: 1px; }
.msg-user { display: flex; align-items: baseline; gap: 7px; font-size: 14px; font-weight: 700; color: #0f1419; line-height: 1.35; white-space: normal; word-break: break-word; }
.msg-user::before { content: attr(data-initial); width: 22px; height: 22px; border-radius: 50%; background: var(--user-accent, #536471); color: #fff; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; transform: translateY(-1px); overflow: hidden; }
.msg-user .msg-av { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; flex-shrink: 0; transform: translateY(-1px); }
.msg-user .msg-av + .msg-av-name::before { display: none; }
.msg-user[data-hasavatar]::before { display: none; }
.msg-item-continuation .msg-user { display: none; }
.msg-time { margin-top: 3px; padding-left: 15px; font-size: 13px; color: #536471; font-variant-numeric: tabular-nums; }
.msg-item-continuation .msg-time { margin-top: 0; color: #7b8894; }
.msg-body { min-width: 0; }
.msg-content { display: inline-block; max-width: 100%; padding: 8px 11px; border: 1px solid #e5edf2; border-radius: 8px; background: #fff; box-shadow: inset 3px 0 0 color-mix(in srgb, var(--user-accent, #cfd9de) 55%, transparent); font-size: 15px; line-height: 1.5; color: #0f1419; word-break: break-word; overflow-wrap: anywhere; }
.msg-content img { max-width: 300px; max-height: 200px; border-radius: 16px; margin-top: 8px; vertical-align: middle; }
.msg-link { color: #1d9bf0; text-decoration: none; word-break: break-all; }
.msg-link:hover { text-decoration: underline; }
.msg-img { max-width: 300px; max-height: 200px; border-radius: 12px; margin-top: 6px; display: block; }
.msg-attach { margin-top: 8px; }
.msg-pics { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.msg-pics img { max-width: 200px; max-height: 160px; border-radius: 12px; object-fit: cover; cursor: pointer; }
.msg-pics img:hover { filter: brightness(0.92); }
.msg-file { display: flex; align-items: center; gap: 10px; margin-top: 6px; padding: 10px 12px; background: #f7f9f9; border-radius: 12px; border: 1px solid #eff3f4; }
.msg-file-icon { font-size: 24px; }
.msg-file-info { flex: 1; min-width: 0; }
.msg-file-name { font-size: 14px; font-weight: 500; color: #0f1419; word-break: break-all; }
.msg-file-download { display: inline-block; margin-top: 4px; font-size: 12px; color: #1d9bf0; text-decoration: none; }
.msg-file-download:hover { text-decoration: underline; }
.msg-video { margin-top: 6px; padding: 6px 10px; background: #f7f9f9; border-radius: 8px; display: inline-block; }
.msg-link-attach { margin-top: 4px; font-size: 13px; }
.lightbox { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.85); cursor: zoom-out; justify-content: center; align-items: center; }
.lightbox.active { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; border-radius: 4px; box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
.msg-page { display: flex; gap: 10px; padding: 8px 10px; margin-top: 6px; border: 1px solid #eff3f4; border-radius: 12px; background: #f7f9f9; cursor: pointer; text-decoration: none; color: inherit; }
.msg-page:hover { background: #eef1f3; }
.msg-page-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
.msg-page-info { min-width: 0; }
.msg-page-title { font-size: 14px; font-weight: 600; color: #0f1419; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.msg-page-desc { font-size: 12px; color: #536471; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.share-card { border: 1px solid #eff3f4; border-radius: 12px; padding: 10px 12px; margin-top: 6px; background: #f7f9f9; }
.share-author { font-size: 13px; font-weight: 700; color: #0f1419; margin-bottom: 4px; }
.share-title { font-size: 14px; font-weight: 600; color: #0f1419; margin-bottom: 4px; }
.share-text { font-size: 14px; color: #0f1419; line-height: 1.45; margin-bottom: 4px; }
.share-desc { font-size: 13px; color: #536471; margin-bottom: 4px; }
.share-stats { font-size: 12px; color: #536471; margin-top: 4px; }
.share-link { display: block; font-size: 12px; color: #1d9bf0; margin-top: 4px; text-decoration: none; word-break: break-all; }
.share-link:hover { text-decoration: underline; }
.emoji { font-size: 1.2em; vertical-align: middle; }
.emoji-unknown { display: inline-block; padding: 1px 5px; margin: 0 1px; border-radius: 4px; background: #f0f2f5; color: #536471; font-size: 12px; vertical-align: middle; }
.forward-quote { border-left: 3px solid #1d9bf0; margin: 4px 0 6px; padding: 8px 12px; background: #e8f4fd; border-radius: 0 6px 6px 0; font-size: 14px; color: #536471; line-height: 1.45; }
.forward-source { display: inline-block; padding: 1px 6px; border-radius: 3px; background: #d9e8f3; font-size: 12px; color: #1d6fa8; }
.forward-reply { margin-top: 2px; }

@media (max-width: 760px) {
    .msg-item { grid-template-columns: 1fr; gap: 6px; }
    .msg-time { display: inline; margin-left: 6px; }
    .msg-meta { display: flex; align-items: baseline; flex-wrap: wrap; gap: 4px; }
}

/* Empty state */
.empty { display: flex; align-items: center; justify-content: center; flex: 1; color: #536471; font-size: 15px; padding: 40px; }

/* Avatar colors */
.av-0 { background: #1d9bf0; color: #fff; }
.av-1 { background: #f4212e; color: #fff; }
.av-2 { background: #ffd400; color: #0f1419; }
.av-3 { background: #00ba7c; color: #fff; }
.av-4 { background: #7856ff; color: #fff; }
.av-5 { background: #ff7a00; color: #fff; }
.av-6 { background: #f91981; color: #fff; }
.av-7 { background: #00d5fa; color: #0f1419; }
.av-8 { background: #7c3aed; color: #fff; }
.av-9 { background: #059669; color: #fff; }

/* Stats Panel */
.stats-toggle { height: 32px; padding: 0 12px; border: 1px solid #cfd9de; border-radius: 9999px; background: #fff; color: #0f1419; cursor: pointer; font-size: 14px; font-weight: 700; transition: all .15s; }
.stats-toggle:hover { background: #f7f9f9; }
.stats-toggle.active { background: #1d9bf0; color: #fff; border-color: #1d9bf0; }
.stats-panel { display: none; flex: 1; overflow-y: auto; padding: 20px 24px; }
.stats-panel.show { display: block; }
.stats-section { margin-bottom: 28px; }
.stats-section-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: #0f1419; }
.stats-chart { display: flex; align-items: flex-end; gap: 3px; height: 180px; padding-bottom: 24px; border-bottom: 1px solid #eff3f4; position: relative; }
.stats-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; min-width: 0; }
.stats-bar { width: 100%; max-width: 40px; border-radius: 4px 4px 0 0; background: #1d9bf0; transition: height .3s; min-height: 2px; position: relative; }
.stats-bar:hover { background: #1a8cd8; }
.stats-bar-val { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #536471; white-space: nowrap; }
.stats-bar-label { font-size: 11px; color: #536471; margin-top: 4px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
.stats-table { width: 100%; border-collapse: collapse; }
.stats-table th, .stats-table td { padding: 8px 12px; text-align: left; font-size: 14px; border-bottom: 1px solid #eff3f4; }
.stats-table th { color: #536471; font-weight: 600; font-size: 12px; text-transform: uppercase; }
.stats-table tr:hover { background: #f7f9f9; }
.stats-table .rank { color: #536471; width: 30px; }
.stats-table .bar-cell { width: 200px; }
.stats-table .mini-bar { height: 8px; border-radius: 4px; background: #1d9bf0; opacity: 0.7; }
.stats-media-grid { display: flex; gap: 12px; flex-wrap: wrap; }
.stats-media-card { padding: 16px 20px; border: 1px solid #eff3f4; border-radius: 12px; min-width: 120px; text-align: center; }
.stats-media-card .num { font-size: 28px; font-weight: 700; color: #0f1419; }
.stats-media-card .label { font-size: 13px; color: #536471; margin-top: 4px; }
.stats-word-list { display: flex; flex-wrap: wrap; gap: 8px; }
.stats-word { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; background: #f7f9f9; border-radius: 9999px; font-size: 14px; color: #0f1419; }
.stats-word .count { font-size: 12px; color: #536471; }
</style>
</head>
<body>

<div class="lightbox" id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src=""></div>

<div class="nav">
    <div class="nav-top">
        <div class="nav-title">Weibo Group Chat Viewer</div>
        <select class="nav-group-select" id="groupSelect" onchange="switchGroup(this.value)" style="display:none"></select>
        <button class="nav-date" id="dateToggle" onclick="toggleCalendar()" data-tooltip="Select a date to view">Select Date</button>
        <button class="stats-toggle" id="statsToggle" onclick="toggleStats()">📊 Stats</button>
        <div class="nav-stats" id="stats"></div>
        <div class="nav-last-archived" id="lastArchived"></div>
    </div>
    <div class="calendar" id="calendar"></div>
</div>

<div class="main">
    <div class="sidebar">
        <div class="sidebar-header" data-tooltip="Click a user to filter their messages">Members</div>
        <div class="user-list" id="userList"></div>
        <div class="user-clear"><button onclick="clearUserFilter()">Clear Filter</button></div>
    </div>
    <div class="content">
        <div class="hours-bar" id="hoursBar"></div>
        <div class="media-bar" id="mediaBar"></div>
        <div class="search-bar" id="searchBar">
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Search messages and users..." oninput="onSearchInput(this.value)">
                <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
            </div>
            <span class="search-count" id="searchCount"></span>
        </div>
        <div class="filter-bar" id="filterBar"></div>
        <div class="messages" id="messages"></div>
        <div class="stats-panel" id="statsPanel"></div>
    </div>
</div>

<script>
function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightbox-img').src = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
let allMessages = [];
let months = [];        // ['2026-04', '2026-05']
let monthDates = {};    // { '2026-05': ['2026-05-01', ...] }
let selectedMonth = '';
let selectedDate = '';
let selectedHours = new Set();
let selectedUsers = new Set();
let mediaFilter = 'all';
let hideNoise = true;   // filter noise: "早" greetings, "领红包" red packets
let searchQuery = '';
let searchDebounceTimer = null;
let currentGroup = '';
let availableGroups = [];
let userColorMap = {};
let calendarOpen = false;
let statsView = false;
let lastVisitTimestamp = parseInt(localStorage.getItem('lastVisitTimestamp') || '0');

const AVATARS = 10;
const USER_ACCENTS = ['#1d9bf0', '#f4212e', '#b8860b', '#00a36c', '#7856ff', '#ff7a00', '#d91a6d', '#008fb3', '#7c3aed', '#059669'];
function getUserColor(user) {
    if (!(user in userColorMap)) userColorMap[user] = Object.keys(userColorMap).length % AVATARS;
    return userColorMap[user];
}

function getUserAccent(user) {
    return USER_ACCENTS[getUserColor(user)];
}

// Weibo emoji → Unicode mapping
const EMOJI_MAP = {
    '[笑cry]': '😂', '[允悲]': '😅', '[doge]': '🐶', '[流鼻血]': '😳',
    '[哈哈]': '😆', '[二哈]': '🐕', '[苦涩]': '😩', '[泪]': '😢',
    '[嘻嘻]': '😊', '[太开心]': '😆', '[捂嘴哭]': '🥹', '[怒]': '😡',
    '[流汗]': '😅', '[赞]': '👍', '[并不简单]': '🧐', '[泪奔]': '😭',
    '[努力]': '😤', '[awsl]': '😍', '[哇]': '🤩', '[good]': '👍',
    '[思考]': '🤔', '[打call]': '📣', '[疑问]': '❓', '[单身狗]': '🐕‍🦺',
    '[抱一抱]': '🤗', '[喵喵]': '🐱', '[傻眼]': '😳', '[挖鼻]': '🫣',
    '[爱你]': '💕', '[鼓掌]': '👏', '[加油]': '💪', '[黑线]': '😑',
    '[害羞]': '😳', '[无聊]': '😴', '[打脸]': '😬', '[偷笑]': '🤭',
    '[裂开]': '💔', '[挤眼]': '😜', '[送花花]': '💐', '[亲亲]': '😘',

    '[酷]': '😎', '[点赞]': '👍', '[可爱]': '🥰', '[皱眉]': '😟',

function getFileIcon(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    const icons = {
        pdf: '📄', doc: '📝', docx: '📝', xls: '📊', xlsx: '📊',
        ppt: '📽️', pptx: '📽️', zip: '📦', rar: '📦', txt: '📃',
        csv: '📊', rtf: '📝', odt: '📝', ods: '📊', odp: '📽️',
    };
    return icons[ext] || '📎';
}

function processEmoji(text) {
    return text.replace(/\[[^\]]+\]/g, (match) => {
        if (EMOJI_MAP[match]) return `<span class="emoji">${EMOJI_MAP[match]}</span>`;
        return `<span class="emoji-unknown">${match}</span>`;
    });
}

// Convert URLs to clickable links, render image URLs as thumbnails
function processUrls(text) {
    return text.replace(/(https?:\/\/[^\s<]+)/g, (url) => {
        const display = url.length > 60 ? url.substring(0, 57) + '...' : url;
        const link = `<a href="${url}" target="_blank" rel="noopener" class="msg-link">${display}</a>`;
        // 图片URL额外显示缩略图
        if (/\.(jpg|jpeg|png|gif|webp)$/i.test(url)) {
            return link + `<br><img src="${url}" loading="lazy" class="msg-img">`;
        }
        return link;
    });
}

// Process forwarded messages: "quoted content" - - - - - - reply
function processForward(text) {
    const SEP = ' - - - - - - - - - - - - - - - ';
    // 统一处理流程：escape → urls → emoji
    const pipe = (s) => processEmoji(processUrls(escapeHtml(s)));

    if (!text.includes(SEP) && !text.startsWith('「')) return pipe(text);

    // 递归解析嵌套转发
    function parseQuote(s) {
        if (!s.includes(SEP)) return { quote: null, reply: s };

        // 找最外层的「」配对
        const firstOpen = s.indexOf('「');
        if (firstOpen !== 0) {
            // 不以「开头，直接按 separator 分割
            const idx = s.indexOf(SEP);
            return { quote: s.substring(0, idx), reply: s.substring(idx + SEP.length) };
        }

        // 找配对的 」
        let depth = 0;
        let closeIdx = -1;
        for (let i = 0; i < s.length; i++) {
            if (s[i] === '「') depth++;
            else if (s[i] === '」') {
                depth--;
                if (depth === 0) { closeIdx = i; break; }
            }
        }

        if (closeIdx === -1) {
            const idx = s.indexOf(SEP);
            if (idx === -1) return { quote: null, reply: s };
            return { quote: s.substring(0, idx), reply: s.substring(idx + SEP.length) };
        }

        const quote = s.substring(1, closeIdx); // 去掉「」
        const rest = s.substring(closeIdx + 1).trim();
        if (rest.startsWith(SEP)) {
            return { quote: quote, reply: rest.substring(SEP.length) };
        }
        return { quote: quote, reply: rest };
    }

    const { quote, reply } = parseQuote(text);
    if (!quote) return pipe(text);

    // 引用内容为 "微博" 时渲染为来源标签
    const quoteLabel = quote.trim() === '微博'
        ? '<span class="forward-source">微博</span>'
        : null;

    // 递归处理嵌套引用
    const quoteHtml = quoteLabel || (parseQuote(quote).quote
        ? processForward(quote)  // 嵌套转发
        : pipe(quote));

    const replyHtml = pipe(reply || '');

    return `<div class="forward-quote">${quoteHtml}</div><div class="forward-reply">${replyHtml}</div>`;
}

// Weekday
const WEEKDAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

function getWeekday(dateStr) {
    return WEEKDAYS[new Date(dateStr + 'T00:00:00').getDay()];
}

async function loadGroups() {
    const resp = await fetch('/api/groups');
    const data = await resp.json();
    availableGroups = data.groups;

    // Show last archived time
    if (data.lastArchived) {
        const dt = new Date(data.lastArchived);
        const pad = n => String(n).padStart(2, '0');
        const timeStr = `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
        document.getElementById('lastArchived').textContent = `Last archived: ${timeStr}`;
    }

    const sel = document.getElementById('groupSelect');
    if (availableGroups.length <= 1) {
        sel.style.display = 'none';
        currentGroup = availableGroups[0]?.id || '';
    } else {
        sel.innerHTML = availableGroups.map(g =>
            `<option value="${g.id}"${g.id === currentGroup ? ' selected' : ''}>${escapeHtml(g.name)}</option>`
        ).join('');
        sel.style.display = '';
        // Default to the last named group (has latest data)
        if (!currentGroup) {
            const namedGroup = availableGroups.find(g => g.id !== '');
            currentGroup = namedGroup ? namedGroup.id : availableGroups[0].id;
        }
    }
}

function switchGroup(groupId) {
    currentGroup = groupId;
    selectedHours.clear();
    selectedUsers.clear();
    mediaFilter = 'all';
    searchQuery = '';
    const si = document.getElementById('searchInput'); if (si) si.value = '';
    const sc = document.getElementById('searchClear'); if (sc) sc.className = 'search-clear';
    loadData();
}

async function loadData() {
    await loadGroups();
    const groupParam = currentGroup ? '?group=' + encodeURIComponent(currentGroup) : '';
    const resp = await fetch('/api/messages' + groupParam);
    const data = await resp.json();
    allMessages = data.messages;

    // Group by month
    const dateSet = new Set(allMessages.map(m => m.date));
    const allDates = [...dateSet].sort();
    monthDates = {};
    allDates.forEach(d => {
        const m = d.slice(0, 7);
        if (!monthDates[m]) monthDates[m] = new Set();
        monthDates[m].add(d);
    });
    // 转为数组
    for (const m in monthDates) monthDates[m] = [...monthDates[m]].sort();
    months = Object.keys(monthDates).sort();

    // Default to latest month and latest date
    selectedMonth = months[months.length - 1];
    const datesInMonth = monthDates[selectedMonth];
    selectedDate = datesInMonth[datesInMonth.length - 1];

    renderCalendar();
    renderHours();
    renderAll();
}

function updateDateToggle() {
    const el = document.getElementById('dateToggle');
    if (!selectedDate) {
        el.textContent = 'Select Date';
        return;
    }
    el.textContent = `${selectedDate} ${getWeekday(selectedDate)} ${calendarOpen ? '▲' : '▼'}`;
}

function toggleCalendar() {
    calendarOpen = !calendarOpen;
    renderCalendar();
    updateDateToggle();
}

// 渲染日历
function renderCalendar() {
    const el = document.getElementById('calendar');
    const [year, month] = selectedMonth.split('-').map(Number);
    const datesWithData = new Set(monthDates[selectedMonth] || []);
    const today = new Date().toISOString().slice(0, 10);

    const firstDay = new Date(year, month - 1, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(year, month, 0).getDate();

    const monthLabel = `${year}-${String(month).padStart(2, '0')}`;

    const prevMonth = months.indexOf(selectedMonth) > 0;
    const nextMonth = months.indexOf(selectedMonth) < months.length - 1;

    let html = `<div class="calendar-header">
        <button class="cal-arrow" ${prevMonth ? '' : 'disabled'} onclick="changeMonth(-1)">‹</button>
        <span>${monthLabel}</span>
        <button class="cal-arrow" ${nextMonth ? '' : 'disabled'} onclick="changeMonth(1)">›</button>
    </div>`;

    // 星期头
    html += '<div class="cal-grid">';
    for (const w of ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']) {
        html += `<div class="cal-weekday">${w}</div>`;
    }

    // 空白天数
    for (let i = 0; i < firstDay; i++) {
        html += '<div class="cal-day empty"></div>';
    }

    // 日期
    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const hasData = datesWithData.has(dateStr);
        const isSelected = dateStr === selectedDate;
        const isToday = dateStr === today;

        let cls = 'cal-day';
        if (hasData) cls += ' has-data';
        if (isSelected) cls += ' selected';
        if (isToday && !isSelected) cls += ' today';

        const onclick = hasData ? `onclick="selectDate('${dateStr}')"` : '';
        html += `<div class="${cls}" ${onclick}>${d}</div>`;
    }

    html += '</div>';
    el.innerHTML = html;
    el.className = 'calendar' + (calendarOpen ? ' show' : '');
}

function changeMonth(delta) {
    const idx = months.indexOf(selectedMonth) + delta;
    if (idx < 0 || idx >= months.length) return;
    selectedMonth = months[idx];
    const dates = monthDates[selectedMonth] || [];
    selectedDate = dates[dates.length - 1];
    selectedHours.clear();
    selectedUsers.clear();
    mediaFilter = 'all';
    searchQuery = '';
    const si = document.getElementById('searchInput'); if (si) si.value = '';
    const sc = document.getElementById('searchClear'); if (sc) sc.className = 'search-clear';
    renderCalendar();
    renderHours();
    renderAll();
}

function selectDate(d) {
    selectedDate = d;
    selectedHours.clear();
    selectedUsers.clear();
    mediaFilter = 'all';
    searchQuery = '';
    const si = document.getElementById('searchInput'); if (si) si.value = '';
    const sc = document.getElementById('searchClear'); if (sc) sc.className = 'search-clear';
    renderCalendar();
    renderHours();
    renderAll();
}

// 小时热力条
function renderHours() {
    const el = document.getElementById('hoursBar');
    const dayMsgs = allMessages.filter(m => m.date === selectedDate);
    const hourCounts = {};
    dayMsgs.forEach(m => {
        const h = new Date(m.timestamp).getHours();
        hourCounts[h] = (hourCounts[h] || 0) + 1;
    });

    const maxCount = Math.max(...Object.values(hourCounts), 1);

    const levels = ['#eef1f3', '#c8dae8', '#7eb3d4', '#3d8ec4', '#1d6fa8'];

    let bars = '';
    for (let h = 0; h < 24; h++) {
        const count = hourCounts[h] || 0;
        let level = 0;
        if (count > 0) {
            const ratio = Math.sqrt(count) / Math.sqrt(maxCount);
            level = Math.max(1, Math.min(4, Math.ceil(ratio * 4)));
        }
        const color = levels[level];
        const active = selectedHours.has(h) ? 'active' : '';
        const empty = count === 0 ? 'empty' : '';
        bars += `<div class="heatmap-cell ${active} ${empty}" onclick="toggleHour(${h})" style="background:${color}" title="${h}:00 · ${count} msgs">${count > 0 ? '<span class="heatmap-count">' + count + '</span>' : ''}</div>`;
    }

    let labels = '';
    for (let h = 0; h < 24; h++) {
        const show = h % 3 === 0;
        labels += `<div class="heatmap-label ${show ? 'show' : 'hide'}">${show ? String(h).padStart(2, '0') : '&nbsp;'}</div>`;
    }

    el.innerHTML = `
        <div class="heatmap-header">
            <span class="heatmap-title" data-tooltip="Click an hour to filter messages by time">Hours</span>
            <button class="hours-clear" onclick="clearHours()">Clear</button>
        </div>
        <div class="heatmap">${bars}</div>
        <div class="heatmap-labels">${labels}</div>
    `;
}

function toggleHour(h) {
    if (selectedHours.has(h)) selectedHours.delete(h);
    else selectedHours.add(h);
    renderHours();
    renderAll();
}

function clearHours() {
    selectedHours.clear();
    renderHours();
    renderAll();
}

// Search
function onSearchInput(value) {
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => {
        searchQuery = value.trim().toLowerCase();
        document.getElementById('searchClear').className = 'search-clear' + (searchQuery ? ' show' : '');
        renderAll();
    }, 150);
}

function clearSearch() {
    searchQuery = '';
    document.getElementById('searchInput').value = '';
    document.getElementById('searchClear').className = 'search-clear';
    document.getElementById('searchCount').textContent = '';
    renderAll();
}

function highlightText(text, query) {
    if (!query) return text;
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escaped})`, 'gi');
    return text.replace(regex, '<span class="search-highlight">$1</span>');
}

// Noise filter: morning greetings, pure punctuation, red packets
const NOISE_RE = /^[早\s~～！!。.·:：?？,，…💗❤️💕🥰😘✨🌟⭐💫🌞☀️🌅👍🤝💪🫶]+$/;
const DOTS_RE = /^[。.·…,，·\s]+$/;
function isNoise(m) {
    const c = (m.content || '').trim();
    if (NOISE_RE.test(c)) return true;
    if (DOTS_RE.test(c)) return true;
    if (c.includes('领红包')) return true;
    return false;
}

// 获取筛选后的消息
function getFiltered() {
    return allMessages.filter(m => {
        if (m.date !== selectedDate) return false;
        if (selectedHours.size > 0) {
            if (!selectedHours.has(new Date(m.timestamp).getHours())) return false;
        }
        if (selectedUsers.size > 0 && !selectedUsers.has(m.user)) return false;
        if (mediaFilter === 'pics' && (!m.pics || m.pics.length === 0)) return false;
        if (mediaFilter === 'video' && !m.videoUrl && m.content !== '分享视频' && m.content !== 'Video') return false;
        if (mediaFilter === 'link' && !m.link && !m.share && !m.videoUrl) return false;
        if (hideNoise && isNoise(m)) return false;
        if (searchQuery) {
            const content = (m.content || '').toLowerCase();
            const user = (m.user || '').toLowerCase();
            if (!content.includes(searchQuery) && !user.includes(searchQuery)) return false;
        }
        return true;
    });
}

// 渲染用户列表
function renderUserList() {
    const dayMsgs = allMessages.filter(m => m.date === selectedDate);
    const userCounts = {};
    const userAvatars = {};
    dayMsgs.forEach(m => {
        userCounts[m.user] = (userCounts[m.user] || 0) + 1;
        if (m.avatar && !userAvatars[m.user]) userAvatars[m.user] = m.avatar;
    });

    const sorted = Object.entries(userCounts).sort((a, b) => b[1] - a[1]);
    const el = document.getElementById('userList');
    el.innerHTML = sorted.map(([user, count]) => {
        const active = selectedUsers.has(user) ? 'active' : '';
        const av = 'av-' + getUserColor(user);
        const initial = user.charAt(0);
        const avatarImg = userAvatars[user] ? `<img src="${userAvatars[user]}" onerror="this.parentElement.innerHTML='${initial}'">` : initial;
        return `<div class="user-item ${active}" onclick="toggleUser(this.dataset.user)" data-user="${escapeAttr(user)}">
            <div class="user-avatar ${av}">${avatarImg}</div>
            <div class="user-info">
                <div class="user-name">${escapeHtml(user)}</div>
                <div class="user-count">${count} msgs</div>
            </div>
        </div>`;
    }).join('');
}

// 渲染消息
function renderMessages(msgs) {
    const el = document.getElementById('messages');
    if (msgs.length === 0) {
        el.innerHTML = '<div class="empty">No messages</div>';
        return;
    }
    el.innerHTML = msgs.map((m, index) => {
        const prev = msgs[index - 1];
        const prevTime = prev ? Number(prev.timestamp) : 0;
        const currentTime = Number(m.timestamp);
        const sameUser = prev && prev.user === m.user && currentTime - prevTime <= 5 * 60 * 1000;
        const time = m.time.split(' ')[1] || '';
        const accent = getUserAccent(m.user);
        const continuation = sameUser ? ' msg-item-continuation' : '';
        let content = processForward(m.content);
        if (searchQuery) {
            content = highlightText(content, escapeHtml(searchQuery));
        }
        // 附件：图片和文件
        let attach = '';
        if (m.pics && m.pics.length > 0) {
            // 检查是否是文件消息（内容是文件名）
            const fileExt = m.content && /\.(pdf|doc|docx|xls|xlsx|ppt|pptx|zip|rar|txt|csv|rtf|odt|ods|odp)$/i.test(m.content);
            if (fileExt && m.pics.length === 1) {
                // 文件消息：显示文件卡片
                const fileUrl = m.pics[0];
                const fileName = escapeHtml(m.content);
                const icon = getFileIcon(m.content);
                attach += `<div class="msg-file">
                    <span class="msg-file-icon">${icon}</span>
                    <div class="msg-file-info">
                        <div class="msg-file-name">${fileName}</div>
                        <a class="msg-file-download" href="${fileUrl}" download="${fileName}">Download</a>
                    </div>
                </div>`;
            } else {
                // 普通图片消息
                attach += '<div class="msg-pics">' + m.pics.map(u => `<img src="${u}" loading="lazy" onclick="openLightbox('${u}')">`).join('') + '</div>';
            }
        }
        // 附件：分享的帖子
        if (m.share) {
            const s = m.share;
            const title = escapeHtml(s.title || s.url || '');
            const author = s.author ? `<div class="share-author">${escapeHtml(s.author)}</div>` : '';
            const text = s.text ? `<div class="share-text">${processEmoji(escapeHtml(s.text))}</div>` : '';
            const desc = s.description ? `<div class="share-desc">${escapeHtml(s.description)}</div>` : '';
            const picsHtml = s.pics && s.pics.length > 0 ? '<div class="msg-pics">' + s.pics.map(u => `<img src="${u}" loading="lazy" onclick="openLightbox('${u}')">`).join('') + '</div>' : '';
            const stats = (s.reposts || s.comments || s.likes) ? `<div class="share-stats">${s.reposts ? 'Reposts ' + s.reposts : ''} ${s.comments ? 'Comments ' + s.comments : ''} ${s.likes ? 'Likes ' + s.likes : ''}</div>` : '';
            const link = s.url ? `<a class="share-link" href="${s.url}" target="_blank" rel="noopener">${escapeHtml(s.url)}</a>` : '';
            attach += `<div class="share-card">${author}${title ? '<div class="share-title">' + title + '</div>' : ''}${text}${desc}${picsHtml}${stats}${link}</div>`;
        }
        // 附件：视频链接
        if (m.videoUrl) {
            attach += `<div class="msg-video"><a href="${m.videoUrl}" target="_blank" rel="noopener" class="msg-link">▶ Watch Video</a></div>`;
        }
        // 附件：普通链接
        if (m.link && !m.share) {
            attach += `<div class="msg-link-attach"><a href="${m.link}" target="_blank" rel="noopener" class="msg-link">${escapeHtml(m.link)}</a></div>`;
        }
        const userInitial = escapeHtml(m.user.charAt(0));
        const avatarHtml = m.avatar ? `<img class="msg-av" src="${m.avatar}" loading="lazy" onerror="this.remove()">` : '';
        const userAttr = m.avatar ? `data-hasavatar data-initial="${userInitial}"` : `data-initial="${userInitial}"`;
        const userName = searchQuery ? highlightText(escapeHtml(m.user), escapeHtml(searchQuery)) : escapeHtml(m.user);
        const isNew = m.timestamp > lastVisitTimestamp;
        const newBadge = isNew ? '<span class="msg-new">NEW</span>' : '';
        return `<div class="msg-item${continuation}" style="--user-accent:${accent}">
            <div class="msg-meta">
                <div class="msg-user" ${userAttr}>${avatarHtml}${userName}${newBadge}</div>
                <div class="msg-time">${time}</div>
            </div>
            <div class="msg-body">
                <div class="msg-content">${content}</div>
                ${attach ? '<div class="msg-attach">' + attach + '</div>' : ''}
            </div>
        </div>`;
    }).join('');
}

function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escapeAttr(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderAll() {
    const filtered = getFiltered();
    renderUserList();
    renderMessages(filtered);
    renderMediaBar();

    const users = new Set(filtered.map(m => m.user));
    const newCount = filtered.filter(m => m.timestamp > lastVisitTimestamp).length;
    const newInfo = newCount > 0 ? ` · <span style="color:#1d9bf0">${newCount} new</span>` : '';
    document.getElementById('stats').innerHTML = `${filtered.length} msgs · ${users.size} members${newInfo}`;
    updateDateToggle();

    // Search count
    if (searchQuery) {
        document.getElementById('searchCount').textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;
    } else {
        document.getElementById('searchCount').textContent = '';
    }

    const bar = document.getElementById('filterBar');
    const parts = [];
    if (searchQuery) {
        parts.push('Search: "' + searchQuery + '"');
    }
    if (selectedHours.size > 0) {
        parts.push('Hours: ' + [...selectedHours].sort((a,b)=>a-b).map(h => String(h).padStart(2,'0')+':00').join(', '));
    }
    if (selectedUsers.size > 0) {
        parts.push('User: ' + [...selectedUsers].join(', '));
    }
    const mediaLabels = { pics: 'Photos', video: 'Video', link: 'Links' };
    if (mediaFilter !== 'all') {
        parts.push('Type: ' + (mediaLabels[mediaFilter] || mediaFilter));
    }
    if (hideNoise) {
        const noiseCount = allMessages.filter(m => {
            if (m.date !== selectedDate) return false;
            if (selectedHours.size > 0 && !selectedHours.has(new Date(m.timestamp).getHours())) return false;
            if (selectedUsers.size > 0 && !selectedUsers.has(m.user)) return false;
            if (!isNoise(m)) return false;
            return true;
        }).length;
        parts.push(`Hidden noise: ${noiseCount}`);
    }
    bar.innerHTML = parts.map(p => `<span>${p}</span>`).join(' · ');
    bar.className = 'filter-bar' + (parts.length ? ' show' : '');

    if (statsView) renderStats();
}

// Statistics Panel
function toggleStats() {
    statsView = !statsView;
    document.getElementById('statsToggle').classList.toggle('active', statsView);
    const msgEl = document.getElementById('messages');
    const statsEl = document.getElementById('statsPanel');
    const hoursEl = document.getElementById('hoursBar');
    const mediaEl = document.getElementById('mediaBar');
    const searchEl = document.getElementById('searchBar');
    const filterEl = document.getElementById('filterBar');

    if (statsView) {
        msgEl.style.display = 'none';
        hoursEl.style.display = 'none';
        mediaEl.style.display = 'none';
        searchEl.style.display = 'none';
        filterEl.style.display = 'none';
        statsEl.classList.add('show');
        renderStats();
    } else {
        msgEl.style.display = '';
        hoursEl.style.display = '';
        mediaEl.style.display = '';
        searchEl.style.display = '';
        filterEl.style.display = '';
        statsEl.classList.remove('show');
    }
}

function renderStats() {
    const filtered = getFiltered();
    const allFiltered = allMessages.filter(m => {
        if (selectedHours.size > 0 && !selectedHours.has(new Date(m.timestamp).getHours())) return false;
        if (selectedUsers.size > 0 && !selectedUsers.has(m.user)) return false;
        if (mediaFilter === 'pics' && (!m.pics || m.pics.length === 0)) return false;
        if (mediaFilter === 'video' && !m.videoUrl && m.content !== '分享视频' && m.content !== 'Video') return false;
        if (mediaFilter === 'link' && !m.link && !m.share && !m.videoUrl) return false;
        if (hideNoise && isNoise(m)) return false;
        if (searchQuery) {
            const c = (m.content || '').toLowerCase();
            const u = (m.user || '').toLowerCase();
            if (!c.includes(searchQuery) && !u.includes(searchQuery)) return false;
        }
        return true;
    });

    const panel = document.getElementById('statsPanel');
    let html = '';
    html += renderDayChart(allFiltered);
    html += renderUserRanking(filtered);
    html += renderHourChart(filtered);
    html += renderMediaBreakdown(allFiltered);
    html += renderWordFrequency(filtered);
    panel.innerHTML = html;
}

function renderDayChart(msgs) {
    const dayCounts = {};
    msgs.forEach(m => { dayCounts[m.date] = (dayCounts[m.date] || 0) + 1; });
    const days = Object.keys(dayCounts).sort();
    if (days.length === 0) return '';
    const maxCount = Math.max(...Object.values(dayCounts));
    const bars = days.map(d => {
        const count = dayCounts[d];
        const height = maxCount > 0 ? Math.max(2, (count / maxCount) * 150) : 2;
        return `<div class="stats-bar-wrap"><div class="stats-bar" style="height:${height}px"><span class="stats-bar-val">${count}</span></div><div class="stats-bar-label">${d.slice(5)}</div></div>`;
    }).join('');
    return `<div class="stats-section"><div class="stats-section-title">Messages Per Day (total: ${msgs.length})</div><div class="stats-chart">${bars}</div></div>`;
}

function renderUserRanking(msgs) {
    const counts = {};
    msgs.forEach(m => { counts[m.user] = (counts[m.user] || 0) + 1; });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 20);
    if (sorted.length === 0) return '';
    const maxCount = sorted[0][1];
    const rows = sorted.map(([user, count], i) => {
        const barWidth = maxCount > 0 ? (count / maxCount) * 100 : 0;
        return `<tr><td class="rank">${i + 1}</td><td>${escapeHtml(user)}</td><td>${count}</td><td class="bar-cell"><div class="mini-bar" style="width:${barWidth}%"></div></td></tr>`;
    }).join('');
    return `<div class="stats-section"><div class="stats-section-title">Top Active Users</div><table class="stats-table"><tr><th>#</th><th>User</th><th>Messages</th><th></th></tr>${rows}</table></div>`;
}

function renderHourChart(msgs) {
    const hourCounts = {};
    msgs.forEach(m => { const h = new Date(m.timestamp).getHours(); hourCounts[h] = (hourCounts[h] || 0) + 1; });
    const maxCount = Math.max(...Object.values(hourCounts), 1);
    const bars = [];
    for (let h = 0; h < 24; h++) {
        const count = hourCounts[h] || 0;
        const height = maxCount > 0 ? Math.max(2, (count / maxCount) * 150) : 2;
        bars.push(`<div class="stats-bar-wrap"><div class="stats-bar" style="height:${height}px"><span class="stats-bar-val">${count}</span></div><div class="stats-bar-label">${String(h).padStart(2, '0')}</div></div>`);
    }
    return `<div class="stats-section"><div class="stats-section-title">Hourly Distribution</div><div class="stats-chart">${bars.join('')}</div></div>`;
}

function renderMediaBreakdown(msgs) {
    let pics = 0, videos = 0, links = 0, shares = 0, plain = 0;
    msgs.forEach(m => {
        const hasPics = m.pics && m.pics.length > 0;
        const hasVideo = !!m.videoUrl;
        const hasShare = !!m.share;
        const hasLink = !hasShare && /https?:\/\//.test(m.content || '');
        if (hasPics) pics++;
        if (hasVideo) videos++;
        if (hasShare) shares++;
        else if (hasLink) links++;
        if (!hasPics && !hasVideo && !hasShare && !hasLink) plain++;
    });
    const cards = [
        { num: msgs.length, label: 'Total' },
        { num: plain, label: 'Text Only' },
        { num: pics, label: 'Photos' },
        { num: videos, label: 'Videos' },
        { num: shares, label: 'Shares' },
        { num: links, label: 'Links' },
    ].map(c => `<div class="stats-media-card"><div class="num">${c.num}</div><div class="label">${c.label}</div></div>`).join('');
    return `<div class="stats-section"><div class="stats-section-title">Media Breakdown</div><div class="stats-media-grid">${cards}</div></div>`;
}

function renderWordFrequency(msgs) {
    const wordCounts = {};
    const STOP_WORDS = new Set(['的','了','是','在','我','有','和','就','不','人','都','一','一个','上','也','很','到','说','要','去','你','会','着','没有','看','好','自己','这','他','她','它','们','那','被','从','把','让','给','对','但','还','而','或','因为','所以','如果','虽然','可以','这个','那个','什么','怎么','吗','吧','呢','啊','哦','嗯','哈','the','a','an','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','could','should','may','might','can','to','of','in','for','on','with','at','by','from','as','into','through','during','before','after','and','but','or','not','no','so','if','than','too','very','it','its','this','that','i','you','he','she','we','they']);
    msgs.forEach(m => {
        const text = (m.content || '').replace(/https?:\/\/[^\s]+/g, '').replace(/\[[^\]]+\]/g, '').trim();
        const tokens = text.match(/[一-鿿]{2,}|[a-zA-Z]{3,}/g) || [];
        tokens.forEach(w => {
            const lower = w.toLowerCase();
            if (!STOP_WORDS.has(lower) && lower.length >= 2) wordCounts[lower] = (wordCounts[lower] || 0) + 1;
        });
    });
    const sorted = Object.entries(wordCounts).filter(([, c]) => c >= 2).sort((a, b) => b[1] - a[1]).slice(0, 50);
    if (sorted.length === 0) return '';
    const words = sorted.map(([word, count]) => `<span class="stats-word">${escapeHtml(word)} <span class="count">×${count}</span></span>`).join('');
    return `<div class="stats-section"><div class="stats-section-title">Frequent Words</div><div class="stats-word-list">${words}</div></div>`;
}

// Update last visit timestamp
function updateLastVisit() {
    const now = Date.now();
    localStorage.setItem('lastVisitTimestamp', String(now));
    lastVisitTimestamp = now;
}

// Update on page unload
window.addEventListener('beforeunload', updateLastVisit);

// Update when switching date
const origSelectDate = selectDate;
selectDate = function(d) {
    updateLastVisit();
    origSelectDate(d);
};

loadData();
</script>
